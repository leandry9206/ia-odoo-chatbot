name: Re-indexar web Odoo

# Corre cada noche a las 3:00 UTC y también de forma manual desde la pestaña Actions.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  reindex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Crawl + Ingest
        env:
          ODOO_SITE_URL: ${{ secrets.ODOO_SITE_URL }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}
        run: npm run reindex
